apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: final-capsule
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Dhanigasree/Final-capsule.git
    targetRevision: main
    path: k8ss

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true